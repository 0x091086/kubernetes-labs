apiVersion: apps/v1
kind: Deployment

metadata:
  name: static-pod
  labels:
    app: static-storage

spec:
  replicas: 2
  selector:
    matchLabels:
      app: static-storage

  template:
    metadata:
      name: static-pod
      labels:
        app: static-storage
    spec:
      containers:
      - name: website
        image: cachac/kubelabs-static-storage:1.0.0
        ports:
        - containerPort: 80
        volumeMounts:
        - name: web-claim
          mountPath: /var/log/nginx

      volumes:
        - name: web-claim
          persistentVolumeClaim:
            claimName: static-pvc